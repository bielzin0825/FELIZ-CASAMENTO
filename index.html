<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felicidades ao CASALL</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #8b7355;
            --secondary: #d4a574;
            --light: #f5f1ed;
            --dark: #2c2c2c;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, #f5f1ed 0%, #ede7e1 100% );
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card-container {
            background: var(--white);
            max-width: 700px;
            width: 100%;
            padding: 60px 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            border-radius: 2px;
            text-align: center;
        }

        .decorative-line {
            width: 60px;
            height: 2px;
            background: var(--secondary);
            margin: 20px auto;
        }

        .main-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.5rem;
            color: var(--primary);
            letter-spacing: 2px;
        }

        .names-section {
            margin: 40px 0;
            padding: 20px 0;
            border-top: 1px solid #e0d5cc;
            border-bottom: 1px solid #e0d5cc;
        }

        .names {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
        }

        .ampersand { color: var(--secondary); margin: 0 10px; }

        .photo-gallery { margin: 40px 0; }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .photo-item {
            height: 200px;
            overflow: hidden;
            border-radius: 2px;
            background: #eee;
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .quote-section {
            background: var(--light);
            padding: 30px;
            margin: 40px 0;
            font-style: italic;
        }

        .quote { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--primary); }

        .messages-display {
            margin-top: 30px;
            text-align: left;
        }

        .message-card {
            background: var(--light);
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid var(--secondary);
            border-radius: 4px;
        }

        .message-author {
            font-weight: bold;
            color: var(--primary);
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .message-text {
            font-style: italic;
            font-size: 0.95rem;
        }

        .form-container {
            background: var(--light);
            padding: 30px;
            margin-top: 40px;
            text-align: left;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            font-family: inherit;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--secondary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        button:hover { background: var(--primary); }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="decorative-line"></div>
        <h1 class="main-title">Felicidades!</h1>
        
        <div class="names-section">
            <p class="names">Vinicius <span class="ampersand">&</span> Cyntia</p>
            <p style="color: #999; margin-top: 10px;">25 DE ABRIL DE 2026</p>
        </div>

        <div class="photo-gallery">
            <div class="gallery-grid">
                <!-- Se você subir as fotos para uma pasta assets/images/ elas aparecerão aqui -->
                <div class="photo-item"><img src="assets/images/foto1.jpg" alt="Foto 1"></div>
                <div class="photo-item"><img src="assets/images/foto2.jpg" alt="Foto 2"></div>
                <div class="photo-item"><img src="assets/images/foto3.jpg" alt="Foto 3"></div>
                <div class="photo-item"><img src="assets/images/foto4.jpg" alt="Foto 4"></div>
                <div class="photo-item"><img src="assets/images/foto5.jpg" alt="Foto 5"></div>
                <div class="photo-item"><img src="assets/images/foto6.jpg" alt="Foto 6"></div>
                <div class="photo-item"><img src="assets/images/foto7.jpg" alt="Foto 7"></div>
                <div class="photo-item"><img src="assets/images/foto8.jpg" alt="Foto 8"></div>
            </div>
        </div>

        <div class="quote-section">
            <p class="quote">""O amor é paciente, é bondoso... Tudo sofre, tudo crê, tudo espera, tudo suporta."</p>
        </div>

        <div class="messages-display" id="messagesList"></div>

       

        <p style="margin-top: 40px; font-style: italic; color: var(--primary);">Com carinho e votos de uma vida linda juntos. Espero que gostem dessa carta de coração e muito amor, felicades aos dois. Ass: Gabriel</p>
        <div class="decorative-line"></div>
    </div>

    <script>
        const wishForm = document.getElementById('wishForm');
        const messagesList = document.getElementById('messagesList');

        function addMessageToScreen(name, text) {
            const card = document.createElement('div');
            card.className = 'message-card';
            card.innerHTML = `
                <div class="message-author">${name}</div>
                <div class="message-text">"${text}"</div>
            `;
            messagesList.prepend(card);
        }

        wishForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('wishName').value;
            const text = document.getElementById('wishText').value;
            addMessageToScreen(name, text);
            alert('Obrigado! Sua mensagem foi adicionada. ❤️');
            this.reset();
        });
    </script>
</body>
</html>
